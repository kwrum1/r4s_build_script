name: Build OpenWRT with Cilium

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Build target device'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - 'x86_64'
      version:
        description: 'OpenWRT version'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - 'snapshot'
      ccache:
        description: 'Enable ccache (cache to speed up builds)'
        type: boolean
        default: false
      build_options:
        description: 'Custom build options'
        required: false
        default: 'BUILD_FAST=y ENABLE_BPF=y'
        type: string

jobs:
  build:
    name: Build OpenWRT ${{ github.event.inputs.device }}
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 配置时区和环境变量
      - name: Setup environment
        run: |
          sudo timedatectl set-timezone 'Asia/Shanghai'
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          echo "build_dir=/builder" >> $GITHUB_ENV
          echo "build_device=${{ github.event.inputs.device }}" >> $GITHUB_ENV
          echo "build_options=${{ github.event.inputs.build_options }}" >> $GITHUB_ENV

      # 安装基础工具和依赖
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ flex bison gawk gettext libssl-dev \
                                  zlib1g-dev file wget git python3-distutils python3-pip unzip curl \
                                  bc tar rsync

      # 下载 OpenWRT 源码
      - name: Clone OpenWRT source
        run: |
          git clone --depth 1 -b master https://github.com/openwrt/openwrt.git /builder/openwrt
          cd /builder/openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 配置内核选项
      - name: Configure Kernel for eBPF and XDP
        run: |
          cd /builder/openwrt
          echo "CONFIG_KERNEL_BPF=y" >> target/linux/x86/config-6.12
          echo "CONFIG_KERNEL_BPF_SYSCALL=y" >> target/linux/x86/config-6.12
          echo "CONFIG_KERNEL_BPF_JIT=y" >> target/linux/x86/config-6.12
          echo "CONFIG_KERNEL_XDP=y" >> target/linux/x86/config-6.12
          echo "CONFIG_KERNEL_BPF_LSM=y" >> target/linux/x86/config-6.12
          echo "CONFIG_KERNEL_NET_CLS_BPF=y" >> target/linux/x86/config-6.12
          echo "CONFIG_KERNEL_NET_ACT_BPF=y" >> target/linux/x86/config-6.12

      # 添加 Cilium 支持
      - name: Add Cilium
        run: |
          mkdir -p /builder/openwrt/package/cilium/files/usr/sbin
          curl -L -o /builder/openwrt/package/cilium/files/usr/sbin/cilium \
            https://github.com/cilium/cilium/releases/download/v1.14.0/cilium-linux-amd64
          chmod +x /builder/openwrt/package/cilium/files/usr/sbin/cilium
          mkdir -p /builder/openwrt/package/cilium/files/etc/init.d
          cat <<'EOF' > /builder/openwrt/package/cilium/files/etc/init.d/cilium
          #!/bin/sh /etc/rc.common
          START=99
          STOP=10
          start() {
              echo "Starting Cilium Agent..."
              /usr/sbin/cilium-agent --config-dir=/etc/cilium --enable-core-dumps &
          }
          stop() {
              echo "Stopping Cilium Agent..."
              killall cilium-agent
          }
          EOF
          chmod +x /builder/openwrt/package/cilium/files/etc/init.d/cilium

      # 启用 CCACHE
      - name: Enable CCACHE (Optional)
        if: ${{ github.event.inputs.ccache == 'true' }}
        run: |
          echo "CONFIG_CCACHE=y" >> .config

      # 开始编译
      - name: Compile OpenWRT
        run: |
          cd /builder/openwrt
          make menuconfig
          make V=s -j$(nproc)

      # 打包固件
      - name: Package Firmware
        run: |
          cd /builder/openwrt
          mkdir -p /builder/output
          cp -r bin/targets/x86/64/* /builder/output

      # 上传固件
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ github.event.inputs.device }}
          path: /builder/output
